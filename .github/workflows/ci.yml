name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run backend tests
        run: ./mvnw -B test

  docker-smoke:
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - backend-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production env file for smoke checks
        run: cp .env.example .env.prod

      - name: Validate development compose file
        run: docker compose config

      - name: Validate production compose file
        run: docker compose -f docker-compose.prod.yml config

      - name: Build frontend production image
        run: docker build -f frontend/Dockerfile -t getmypage/frontend:ci ./frontend

      - name: Build backend production image
        run: docker build -f backend/Dockerfile -t getmypage/backend:ci ./backend
